<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="DuoHub — track shared expenses, savings goals and tasks together." />
    <title>DuoHub</title>
    <script>
      // Apply saved theme before anything renders to avoid a light flash
      try {
        var t = localStorage.getItem('duohub:theme');
        if (t === '"dark"' || t === 'dark') document.documentElement.classList.add('dark');
      } catch (e) { /* storage unavailable */ }
    </script>
    <style>
      @keyframes duohub-spin { to { transform: rotate(360deg); } }
      html.dark #duohub-splash { background: #0f172a !important; }
      html.dark #duohub-splash p { color: #f1f5f9 !important; }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Initial splash — shown instantly, replaced when the app renders -->
      <div id="duohub-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f9fafb;font-family:ui-sans-serif,system-ui,sans-serif;">
        <div style="width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center;color:#fff;font-size:32px;font-weight:800;box-shadow:0 8px 24px rgba(99,102,241,.35);">D</div>
        <p style="margin-top:16px;font-size:18px;font-weight:800;letter-spacing:-.02em;color:#1f2937;">DuoHub</p>
        <div style="margin-top:16px;width:28px;height:28px;border:3px solid #e0e7ff;border-top-color:#6366f1;border-radius:50%;animation:duohub-spin .8s linear infinite;"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
